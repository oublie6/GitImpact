server:
  port: "8080"
auth:
  mode: mixed
  jwt_secret: "change-me"
  token_expire_minutes: 120
  enable_register: true
  init_admin_enabled: true
  config_users:
    - username: config_admin
      password: "Admin@123456"
      display_name: "Config Admin"
      email: "config_admin@example.com"
      role: admin
      status: active
    - username: config_user
      password: "User@123456"
      display_name: "Config User"
      role: user
      status: active
database:
  type: mysql
  dsn: "root:root@tcp(127.0.0.1:3306)/gitimpact?charset=utf8mb4&parseTime=True&loc=Local"
  mysql:
    host: "127.0.0.1"
    port: "3306"
    dbname: "gitimpact"
    user: "root"
    password: "root"
  dameng:
    host: "127.0.0.1"
    port: "5236"
    dbname: "SYSDBA" # 作为 schema 使用
    user: "SYSDBA"
    password: "SYSDBA"
    # 当 database.type=dameng 且 database.dsn 为空时，会自动拼接：
    # dm://<user>:<password>@<host>:<port>?schema=<dbname>
    # 也可直接设置 database.dsn 覆盖，如：
    # dsn: "dm://SYSDBA:SYSDBA@127.0.0.1:5236?schema=SYSDBA"
opencode:
  binary_path: "opencode"
  attach_url: "http://127.0.0.1:4096"
  default_model: "gpt-4.1"
  default_agent: "impact"
  timeout_seconds: 600
workdir:
  root: "./runtime"
  repo_cache: "./runtime/repos"
  artifacts: "./runtime/artifacts"
  reports: "./runtime/reports"
