server:
  port: "8080"
auth:
  mode: mixed
  jwt_secret: "change-me"
  token_expire_minutes: 120
  enable_register: true
  init_admin_enabled: true
  config_users:
    - username: config_admin
      password_hash: "$2a$10$8aMnM3zRGswyfWCGfFTWUO/Jci8hV3dqjhkPyp6Vn7I.xXvDO4Tm2"
      display_name: "Config Admin"
      email: "config_admin@example.com"
      role: admin
      status: active
      source: config
      allow_dev_plain: false
    - username: dev_plain
      password_plain: "dev123456"
      allow_dev_plain: true # 仅开发环境可用
      display_name: "Dev Plain User"
