database:
  type: mysql
  dsn: "root:root@tcp(127.0.0.1:3306)/gitimpact?charset=utf8mb4&parseTime=True&loc=Local"
  mysql:
    host: "127.0.0.1"
    port: "3306"
    dbname: "gitimpact"
    user: "root"
    password: "root"
  dameng:
    host: "127.0.0.1"
    port: "5236"
    dbname: "GITIMPACT"
    user: "SYSDBA"
    password: "SYSDBA"
opencode:
  binary_path: "opencode"
  attach_url: "http://127.0.0.1:4096"
  default_model: "gpt-4.1"
  default_agent: "impact"
  timeout_seconds: 600
workdir:
  root: "./runtime"
  repo_cache: "./runtime/repos"
  artifacts: "./runtime/artifacts"
  reports: "./runtime/reports"
